<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hello profile card</title>
  <desc id="desc">A cute profile card for a GitHub README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF1F7"/>
      <stop offset="0.5" stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="screen" x1="315" y1="82" x2="812" y2="238" gradientUnits="userSpaceOnUse">
