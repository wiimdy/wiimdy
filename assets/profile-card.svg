<svg width="1000" height="320" viewBox="0 0 1000 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Security dossier</title>
  <desc id="desc">A compact web3 security research profile card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.56" stop-color="#151827"/>
      <stop offset="1" stop-color="#2B1210"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="54" x2="860" y2="254" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DC2626"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1040" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1000" height="320" rx="22" fill="url(#bg)"/>
  <path d="M0 236C112 202 180 262 304 222C425 183 497 96 628 118C759 140 811 242 1000 192V320H0V236Z" fill="url(#accent)" opacity="0.18"/>
  <path d="M0 251C140 211 216 275 348 233C466 195 535 120 655 136C789 154 835 247 1000 209" stroke="url(#accent)" stroke-width="2" opacity="0.36"/>

  <g opacity="0.28">
    <path d="M80 46H920" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <path d="M80 88H920" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M80 130H920" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M80 172H920" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M80 214H920" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M80 256H920" stroke="#FFFFFF" stroke-opacity="0.12"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="98" y="58" width="804" height="204" rx="16" fill="#0D1117" stroke="#30363D"/>
    <rect x="98" y="58" width="804" height="38" rx="16" fill="#161B22"/>
    <path d="M98 82H902" stroke="#30363D"/>
    <circle cx="124" cy="77" r="6" fill="#F87171"/>
    <circle cx="146" cy="77" r="6" fill="#FBBF24"/>
    <circle cx="168" cy="77" r="6" fill="#34D399"/>

    <text x="500" y="145" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="0">
      security dossier
    </text>
    <text x="500" y="178" text-anchor="middle" fill="#FCA5A5" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="17">
      audits / exploit reproduction / incident analysis
    </text>

    <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15">
      <text x="180" y="222" fill="#9CA3AF">mode:</text>
      <text x="236" y="222" fill="#F97316">on-chain traces</text>
      <text x="416" y="222" fill="#9CA3AF">output:</text>
      <text x="484" y="222" fill="#F97316">PoC / RCA / notes</text>
      <text x="690" y="222" fill="#9CA3AF">status:</text>
      <text x="758" y="222" fill="#34D399">research</text>
    </g>
  </g>
</svg>
