    <rect x="128" y="110" width="156" height="94" rx="18" fill="#111827"/>
    <circle cx="176" cy="151" r="10" fill="#FDF2F8"/>
    <circle cx="238" cy="151" r="10" fill="#FDF2F8"/>
    <rect x="184" y="178" width="46" height="8" rx="4" fill="#FDF2F8"/>
    <rect x="168" y="220" width="76" height="10" rx="5" fill="#111827" opacity="0.22"/>

