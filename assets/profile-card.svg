    <path d="M344 112H904" stroke="#374151"/>
    <circle cx="374" cy="91" r="6" fill="#FF6B9D"/>
    <circle cx="396" cy="91" r="6" fill="#FDBA74"/>
    <circle cx="418" cy="91" r="6" fill="#67E8F9"/>

