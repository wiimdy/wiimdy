    </linearGradient>
    <filter id="softShadow" x="-30" y="-30" width="1060" height="380" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#FB7185" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1000" height="320" rx="28" fill="url(#bg)"/>

  <g opacity="0.85">
    <path d="M78 68L88 88L110 91L94 106L98 128L78 117L58 128L62 106L46 91L68 88L78 68Z" fill="#FDBA74"/>
